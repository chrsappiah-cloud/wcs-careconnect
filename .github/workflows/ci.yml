name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile-tests:
    name: Mobile — Unit & Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: |
          node -e "
            const {spawnSync} = require('child_process');
            const r = spawnSync(
              process.execPath,
              [
                'node_modules/.bin/jest',
                '--watchAll=false',
                '--forceExit',
                '--maxWorkers=2',
                '--no-watchman',
                '--no-coverage',
                '--ci',
              ],
              {
                cwd: process.cwd(),
                env: { ...process.env, FORCE_COLOR: '0', CI: 'true' },
                encoding: 'utf8',
                timeout: 300000,
              }
            );
            const out = (r.stdout || '') + (r.stderr || '');
            console.log(out);
            if (r.status !== 0) process.exit(r.status || 1);
          "

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-results
          path: apps/mobile/coverage/
          retention-days: 14

  mobile-lint:
    name: Mobile — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for console.error / TODO in changed files
        run: |
          git diff --name-only origin/${{ github.base_ref || 'main' }}...HEAD -- '*.js' '*.jsx' '*.ts' '*.tsx' 2>/dev/null | \
            xargs grep -l "console\.error\|console\.warn\|TODO\|FIXME\|HACK" 2>/dev/null || true

  backend-tests:
    name: Backend — API Contract + Happy Path Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend API contract + happy-path tests
        run: npm test -- --runInBand --ci

  all-checks-pass:
    name: All Checks Pass
    runs-on: ubuntu-latest
    needs: [mobile-tests, mobile-lint, backend-tests]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.mobile-tests.result }}" != "success" ]]; then
            echo "mobile-tests failed"
            exit 1
          fi
          if [[ "${{ needs.backend-tests.result }}" != "success" ]]; then
            echo "backend-tests failed"
            exit 1
          fi
          echo "All checks passed"

  deploy:
    name: Deploy — ECR push + ECS rolling update
    runs-on: ubuntu-latest
    needs: all-checks-pass
    # Only deploy on pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write   # OIDC token for AWS assume-role
      contents: read
    env:
      AWS_REGION:   ap-southeast-2
      ECR_REPO:     careconnect-backend
      ECS_CLUSTER:  careconnect
      ECS_SERVICE:  careconnect-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:   ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:       ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        id: build-image
        working-directory: apps/backend
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build \
            --cache-from "$ECR_REGISTRY/$ECR_REPO:latest" \
            -t "$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPO:latest" \
            .
          docker push "$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPO:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS (rolling update)
        run: |
          aws ecs update-service \
            --cluster  "$ECS_CLUSTER" \
            --service  "$ECS_SERVICE" \
            --force-new-deployment \
            --region   "$AWS_REGION"

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region  "$AWS_REGION"
